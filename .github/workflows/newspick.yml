name: Newspick Daily

on:
  schedule:
    - cron: '30 23 * * *'  # 毎日 08:30 JST (= 23:30 UTC)
  workflow_dispatch:         # Actions タブから手動実行可能

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      models: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Newspick 実行
        env:
          AI_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/newspick.py --now

  x_draft:
    needs: collect
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      models: read

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: X 投稿下書き生成
        env:
          AI_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: python scripts/x_draft_generator.py
